name: Cloud Android Build
on:
  push:
    branches: [ main ]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execution permission for builder
      run: chmod +x gradlew

    - name: Build Debug App Installer
      run: ./gradlew assembleDebug

    - name: Save APK File to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: MedicineTrackerApp
        path: "**/build/outputs/apk/debug/*.apk"